spring.datasource.url=jdbc:postgresql://localhost:5432/avito
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.driver-class-name=org.postgresql.Driver

# Задаем точный путь к нашему мастер-файлу миграций (без точек в путях папок)
spring.liquibase.change-log=classpath:db/changelog/changelog-master.yaml

# Автоматическое создание таблиц в базе данных на основе наших Java-классов
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Разрешаем загрузку больших файлов
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB